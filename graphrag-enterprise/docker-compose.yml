version: "3.9"

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: nic-backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app          # hot-reload: uvicorn --reload picks up changes
    networks:
      - nic-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vite / React frontend ────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: nic-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules        # keep container's node_modules isolated
    networks:
      - nic-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nic-nginx
    restart: unless-stopped
    ports:
      - "80:80"                  # single public entry point
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nic-net
    depends_on:
      - backend
      - frontend

networks:
  nic-net:
    driver: bridge