version: "3.9"

services:

 backend:
  build: ./backend
  container_name: nic_backend
  restart: unless-stopped
  env_file: ./backend/.env
  volumes:
   - ./backend:/app
  networks:
   - nic-net
  healthcheck:
   test: ["cmd","curl","-f","http://localhost:8000/health"]
   interval: 10s
   timeout: 5s
   retries: 5





  frontend:
   build: ./frontend
   container_name: nic-frontend
   restart: unless-stopped
   volumes:
    - ./frontend:/app
    - /app/node_modules
   networks:
    - nic-net
   depends_on:
     backend:
      condition: service_healthy


  
  
  nginx:
    image: nginx:1.25-alpine
    container_name: nic-nginx
    restart: unless-stopped
    ports:
      - "80:80"                  # single public entry point
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nic-net
    depends_on:
      - backend
      - frontend
 
  networks:
    nic-net:
      driver: bridge

     