version: "3.9"

services:

  # ── Neo4j Graph Database ─────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: nic-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"    # Neo4j Browser UI — open http://localhost:7474 in your browser
      - "7687:7687"    # Bolt protocol — used by the Python driver
    environment:
      NEO4J_AUTH: neo4j/changeme          # user/password — must match .env
      NEO4J_PLUGINS: '["apoc"]'           # APOC utility library (useful for Iteration 6)
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size:    1g
    volumes:
      - neo4j_data:/data                  # persists graph across restarts
      - neo4j_logs:/logs
    networks:
      - nic-net
    healthcheck:
      # THE FIX: Pings the actual web server port instead of just checking if the JVM is awake.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s                   # Neo4j takes ~20s to fully start

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: nic-backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - nic-net
    depends_on:
      neo4j:
        condition: service_healthy        # wait for Neo4j before starting FastAPI
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vector Embeddings Init Script ────────────────────────────────────────────
  vector-init:
    build: 
      context: ./backend
    container_name: govintel_vector_init
    command: python scripts/hydrate_vectors.py
    env_file:
      - ./backend/.env
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - nic-net
    volumes:
      - ./backend:/app
    restart: "no" # It runs once and stops. It should not restart.

  # ── Vite / React frontend ────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: nic-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - nic-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nic-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - nic-net
    depends_on:
      - backend
      - frontend

networks:
  nic-net:
    driver: bridge

volumes:
  neo4j_data:    # named volume — graph data persists between docker-compose restarts
  neo4j_logs: